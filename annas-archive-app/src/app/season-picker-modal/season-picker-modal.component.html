<h2 mat-dialog-title>{{ data.title }} — choose seasons</h2>

<mat-dialog-content>
  <div class="quick-actions">
    <button mat-button (click)="selectAll()">Select All</button>
    <button mat-button (click)="selectNone()">Select None</button>
  </div>

  <div class="season-list">
    <mat-checkbox
      *ngFor="let choice of choices"
      [(ngModel)]="choice.selected"
      class="season-row"
    >
      {{ choice.label }}
      <span class="episode-count" *ngIf="choice.episodeCount">({{ choice.episodeCount }} episodes)</span>
      <span class="already-added-tag" *ngIf="choice.alreadyAdded">already added</span>
    </mat-checkbox>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="confirm()">Add Selected</button>
</mat-dialog-actions>
