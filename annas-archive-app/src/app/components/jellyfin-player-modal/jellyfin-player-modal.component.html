<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content class="player-content">
  <iframe
    [src]="safeEmbedUrl"
    class="player-frame"
    allow="autoplay; fullscreen"
    allowfullscreen
  ></iframe>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
